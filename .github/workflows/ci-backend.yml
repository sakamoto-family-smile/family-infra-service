name: CI - Backend

on:
  pull_request:
    paths:
      - 'backend/**'
  push:
    branches: [develop, main]
    paths:
      - 'backend/**'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: family_app
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: family_app_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        working-directory: backend
        run: uv sync --dev

      - name: Lint (ruff)
        working-directory: backend
        run: uv run ruff check .

      - name: Type check (mypy)
        working-directory: backend
        run: uv run mypy app/

      - name: Run tests (pytest)
        working-directory: backend
        run: uv run pytest --cov=app --cov-report=xml -v
        env:
          ENV: test
          DB_USER: family_app
          DB_PASSWORD: test_password
          DB_NAME: family_app_test
          CLOUD_SQL_INSTANCE: ""
          GCP_PROJECT_ID: youyaku-ai-dev
          FIREBASE_PROJECT_ID: youyaku-ai-dev
          GCS_BUCKET: family-app-media-test
          CLOUD_TASKS_QUEUE: family-app-tasks
          CLOUD_TASKS_LOCATION: asia-northeast1
          CLOUD_RUN_SERVICE_URL: http://localhost:8080

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: backend/coverage.xml
