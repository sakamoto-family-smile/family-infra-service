name: CD - Firebase Rules & Indexes

on:
  push:
    branches: [develop, main]
    paths:
      - 'firebase/**'

jobs:
  set-env:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      firebase_project: ${{ steps.env.outputs.firebase_project }}
    steps:
      - id: env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
            echo "firebase_project=youyaku-ai" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
            echo "firebase_project=youyaku-ai-dev" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: set-env
    runs-on: ubuntu-latest
    environment: ${{ needs.set-env.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase Tools
        run: npm install -g firebase-tools

      - name: Deploy Firestore Rules & Indexes + Storage Rules
        working-directory: firebase
        run: |
          npx firebase-tools deploy \
            --only firestore:rules,firestore:indexes,storage \
            --project ${{ needs.set-env.outputs.firebase_project }} \
            --token "${{ secrets.FIREBASE_TOKEN }}"
